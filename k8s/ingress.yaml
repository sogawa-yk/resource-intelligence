apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ri-agent-ingress
  namespace: ri-agent
  annotations:
    oci-native-ingress.oraclecloud.com/backend-tls-enabled: "false"
    oci-native-ingress.oraclecloud.com/healthcheck-path: "/"
    oci-native-ingress.oraclecloud.com/healthcheck-port: "8000"
    oci-native-ingress.oraclecloud.com/healthcheck-protocol: "HTTP"
    oci-native-ingress.oraclecloud.com/https-listener-port: "443"
spec:
  ingressClassName: mcp-ingress-class
  rules:
    - host: ri.sogawa-yk.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ri-agent
                port:
                  number: 8000
  tls:
    - hosts:
        - ri.sogawa-yk.com
      secretName: wildcard-tls-secret
